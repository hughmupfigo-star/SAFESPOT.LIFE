<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — SAFE</title>
<meta name="description" content="Review your order. Fast, secure checkout powered by Stripe.">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.checkout-container { max-width: 600px; margin: 0 auto; padding: 60px 20px; }
.checkout-section { border: 1px solid var(--border); padding: 40px; border-radius: 4px; background: var(--off); }
.checkout-title { font-size: 16px; font-weight: 500; margin-bottom: 28px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 0.1em; color: var(--black); }
.cart-item { display: grid; grid-template-columns: 1fr auto; gap: 20px; padding: 16px 0; border-bottom: 1px solid var(--border); }
.cart-item:last-of-type { border-bottom: none; }
.item-details h4 { margin: 0 0 4px 0; font-size: 14px; }
.item-details p { margin: 0; font-size: 13px; color: var(--mid); }
.item-price { text-align: right; font-weight: 600; font-size: 15px; }
.delivery-option { padding: 16px; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
.delivery-option:hover { background: var(--white); }
.delivery-option input[type="radio"] { margin: 0; flex-shrink: 0; }
.delivery-label { display: flex; justify-content: space-between; align-items: center; flex: 1; }
.delivery-info { display: flex; flex-direction: column; }
.delivery-name { font-weight: 500; font-size: 14px; }
.delivery-time { font-size: 12px; color: var(--mid); margin-top: 2px; }
.delivery-price { font-weight: 600; }
.order-summary { background: var(--white); padding: 24px; border-radius: 4px; border: 1px solid var(--border); margin-top: 32px; }
.summary-row { display: flex; justify-content: space-between; padding: 12px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
.summary-row:last-child { border-bottom: none; font-weight: 600; font-size: 16px; padding-top: 16px; border-top: 2px solid var(--border); margin-top: 16px; }
.checkout-btn { width: 100%; padding: 16px; background: #0066cc; color: white; border: none; border-radius: 4px; font-family: var(--sans); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 28px; }
.checkout-btn:hover:not(:disabled) { background: #0052a3; }
.checkout-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.checkout-btn.loading { opacity: 0.7; }
.empty-cart { text-align: center; padding: 80px 20px; }
.empty-cart-icon { font-size: 48px; margin-bottom: 20px; }
.empty-cart p { color: var(--mid); margin-bottom: 24px; }
.empty-cart a { display: inline-block; padding: 12px 28px; background: var(--black); color: var(--white); text-decoration: none; border-radius: 4px; font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; }
html[data-theme="dark"] .checkout-section { background: #1a1a1a; }
html[data-theme="dark"] .order-summary { background: #2a2a2a; border-color: #444; }
html[data-theme="dark"] .delivery-option:hover { background: #2a2a2a; }
html[data-theme="dark"] .checkout-title { color: #f5f5f5; }
</style>
  <script defer src="analytics.js"></script>
</head>
<body>

<nav>

    <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <button class="nav-toggle" aria-label="Open menu" aria-haspopup="dialog" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" width="20" height="20">
      <circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2.5"/><path d="M 18 8 L 20 6 L 22 8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <a class="nav-logo" href="index.html">S·A·F·E</a>
</nav>
