<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Confirmed — SAFE</title>
<meta name="description" content="Your order has been confirmed">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .success-container {
    max-width: 600px;
    margin: 0 auto;
    padding: 60px 20px;
    text-align: center;
  }

  .success-icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 32px;
    background: #27ae60;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    color: white;
  }

  .success-title {
    font-size: 32px;
    margin: 0 0 12px 0;
    font-weight: 500;
  }

  .order-details {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin: 32px 0;
    text-align: left;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .detail-row:last-child {
    border-bottom: none;
  }

  .button-group {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .button {
    display: inline-block;
    padding: 12px 28px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
  }

  .button-primary {
    background: var(--text);
    color: var(--bg);
  }

  .button-secondary {
    background: var(--border);
    color: var(--text);
  }

  .loading {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
  <script defer src="analytics.js"></script>
</head>
<body>

<nav>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <svg class="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <button class="nav-toggle" aria-label="Open menu" aria-haspopup="dialog" aria-expanded="false"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true" width="20" height="20"><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2.5"/><path d="M 18 8 L 20 6 L 22 8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>

  <button class="cart-toggle" id="cartToggle" aria-label="Shopping cart">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
      <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M 1 1 h 4 l 2.68 13.39a2 2 0 0 0 2 1.61h 9.72a2 2 0 0 0 2-1.61L23 6H6"/>
    </svg>
    <span class="cart-count" id="cartCount">0</span>
  </button>
</nav>

<main class="success-container">
  <div id="loadingState">
    <div class="loading" style="font-size: 48px;">↻</div>
    <p style="color: var(--mid); margin-top: 16px;">Verifying your payment...</p>
  </div>

  <div id="successState" style="display: none;">
    <div class="success-icon">✓</div>
    <h1 class="success-title">Order Confirmed!</h1>

    <div class="order-details">
      <div class="detail-row">
        <span>Order Number</span>
        <span id="orderNumber">—</span>
      </div>
      <div class="detail-row">
        <span>Order Date</span>
        <span id="orderDate">—</span>
      </div>
      <div class="detail-row">
        <span>Total Amount</span>
        <span id="orderTotal">—</span>
      </div>
    </div>

    <div class="button-group">
      <a href="shop.html" class="button button-secondary">Continue Shopping</a>
      <a href="mailto:enquiries@safespot.life" class="button button-primary">Contact Support</a>
    </div>
  </div>

  <div id="errorState" style="display: none;">
    <h1 class="success-title">Payment Verification Failed</h1>
    <p id="errorMessage"></p>
    <div class="button-group">
      <a href="checkout.html" class="button button-primary">Try Again</a>
    </div>
  </div>
</main>

<script>
async function verifyPayment() {
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');

  if (!sessionId) {
    showError('No session ID found.');
    return;
  }

  try {
    // UPDATE THIS WITH YOUR VERCEL URL
    const apiDomain = 'https://safe-store-api.vercel.app';

    const response = await fetch(`${apiDomain}/api/session?sessionId=${sessionId}`);
    const data = await response.json();

    if (!response.ok || data.error) {
      showError(data.error || 'Verification failed');
      return;
    }

    document.getElementById('orderNumber').textContent = data.sessionId || '—';
    document.getElementById('orderDate').textContent = new Date().toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('orderTotal').textContent = '£' + (data.amount_total / 100).toFixed(2);

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('successState').style.display = 'block';

  } catch (error) {
    console.error('Error:', error);
    showError('Unable to verify payment. Check your email.');
  }
}

function showError(message) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
  document.getElementById('errorMessage').textContent = message;
}

document.addEventListener('DOMContentLoaded', verifyPayment);
</script>


<!-- Cart Count Badge -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  const cartToggle = document.getElementById('cartToggle');
  const cartCount = document.getElementById('cartCount');

  if(!cartToggle || !cartCount) return;

  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('safeCart')) || [];
    cartCount.textContent = cart.length;
  }

  cartToggle.addEventListener('click', function() {
    window.location.href = 'shop.html';
  });

  updateCartCount();
  setInterval(updateCartCount, 1000);
});
</script>

<script src="theme.js"></script>
<script src="bento.js" defer></script>
<script>
/* Purchase complete — empty the cart. */
try { localStorage.removeItem('safeCart'); window.dispatchEvent(new Event('cartUpdated')); var c=document.getElementById('cartCount'); if(c) c.textContent='0'; } catch(e){}
</script>
</body>
</html>
