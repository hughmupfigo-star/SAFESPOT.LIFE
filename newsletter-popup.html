<!-- SAFE Blog Newsletter Popup Modal
Add this to the bottom of your blog pages (before </body>) -->

<div id="newsletter-popup" class="newsletter-popup">
  <div class="newsletter-popup-content">
    <!-- Close button -->
    <button class="newsletter-close" onclick="closeNewsletterPopup()" aria-label="Close newsletter popup">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>

    <!-- Content -->
    <div class="newsletter-inner">
      <h2 class="newsletter-title">Weekly wisdom for young people.</h2>
      <p class="newsletter-subtitle">Real advice on therapy, jobs, housing, rights. No spam. Unsubscribe anytime.</p>

      <!-- Form -->
      <form class="newsletter-form" onsubmit="handleNewsletterSubmit(event)">
        <div class="form-row">
          <input
            type="text"
            name="name"
            placeholder="Your name (optional)"
            class="newsletter-input"
            autocomplete="given-name"
          />
        </div>
        <div class="form-row">
          <input
            type="email"
            name="email"
            placeholder="you@example.com"
            class="newsletter-input"
            required
            autocomplete="email"
          />
        </div>
        <button type="submit" class="newsletter-submit">Subscribe</button>
      </form>

      <p class="newsletter-note">We'll send a confirmation email. Check spam if you don't see it.</p>
    </div>
  </div>
</div>

<style>
/* Newsletter Popup Styles */
.newsletter-popup {
  position: fixed;
  inset: 0;
  background: rgba(10, 10, 10, 0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  padding: 20px;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.3s ease, visibility 0.3s ease;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
}

.newsletter-popup.visible {
  opacity: 1;
  visibility: visible;
}

.newsletter-popup-content {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  max-width: 460px;
  width: 100%;
  position: relative;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.newsletter-close {
  position: absolute;
  top: 20px;
  right: 20px;
  background: none;
  border: none;
  width: 32px;
  height: 32px;
  padding: 0;
  cursor: pointer;
  color: var(--mid);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s ease;
  z-index: 10;
}

.newsletter-close:hover {
  color: var(--black);
}

.newsletter-inner {
  padding: 48px 40px;
}

.newsletter-title {
  font-size: 24px;
  font-weight: 300;
  line-height: 1.3;
  color: var(--black);
  margin: 0 0 12px;
  letter-spacing: -0.01em;
}

.newsletter-subtitle {
  font-size: 14px;
  color: var(--mid);
  font-weight: 300;
  line-height: 1.6;
  margin: 0 0 28px;
}

.newsletter-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 16px;
}

.form-row {
  display: flex;
}

.newsletter-input {
  flex: 1;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--black);
  background: var(--white);
  transition: border-color 0.2s ease;
}

.newsletter-input:focus {
  outline: none;
  border-color: var(--black);
  box-shadow: 0 0 0 2px rgba(10, 10, 10, 0.1);
}

.newsletter-input::placeholder {
  color: var(--light);
}

.newsletter-submit {
  padding: 12px 24px;
  background: var(--black);
  color: var(--white);
  border: 1px solid var(--black);
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 4px;
}

.newsletter-submit:hover {
  background: var(--off);
  color: var(--black);
}

.newsletter-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.newsletter-note {
  font-size: 12px;
  color: var(--light);
  margin: 0;
  text-align: center;
  font-weight: 300;
}

/* Dark Mode */
html[data-theme="dark"] .newsletter-popup {
  background: rgba(0, 0, 0, 0.7);
}

html[data-theme="dark"] .newsletter-popup-content {
  background: #1a1a1a;
  border-color: #333333;
}

html[data-theme="dark"] .newsletter-title {
  color: #f5f5f5;
}

html[data-theme="dark"] .newsletter-subtitle {
  color: #b0b0b0;
}

html[data-theme="dark"] .newsletter-close {
  color: #b0b0b0;
}

html[data-theme="dark"] .newsletter-close:hover {
  color: #f5f5f5;
}

html[data-theme="dark"] .newsletter-input {
  background: #0d0d0d;
  border-color: #333333;
  color: #f5f5f5;
}

html[data-theme="dark"] .newsletter-input::placeholder {
  color: #666666;
}

html[data-theme="dark"] .newsletter-input:focus {
  border-color: #f5f5f5;
  box-shadow: 0 0 0 2px rgba(245, 245, 245, 0.1);
}

html[data-theme="dark"] .newsletter-submit {
  background: #f5f5f5;
  color: #0d0d0d;
  border-color: #f5f5f5;
}

html[data-theme="dark"] .newsletter-submit:hover {
  background: #e0e0e0;
}

  color: #999999;
}

/* Mobile */
@media (max-width: 480px) {
  .newsletter-popup-content {
    margin: 0 16px;
  }

  .newsletter-inner {
    padding: 32px 24px;
  }

  .newsletter-title {
    font-size: 20px;
  }

  .newsletter-subtitle {
    font-size: 13px;
    margin-bottom: 24px;
  }
}
</style>
